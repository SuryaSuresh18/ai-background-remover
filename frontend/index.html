<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>AI Background Remover</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            margin-bottom: 15px;
        }

        input[type="file"] {
            margin: 15px 0;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #4f46e5;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:disabled {
            background: gray;
        }

        .status {
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>

<body>
<div class="container">
    <h2>AI Background Remover</h2>

    <input type="file" id="imageInput" accept="image/*">
    <br>

    <button id="removeBtn">Remove Background</button>

    <div class="status" id="status"></div>
</div>

<script>
    const button = document.getElementById("removeBtn");
    const statusText = document.getElementById("status");

    button.onclick = async () => {
        const input = document.getElementById("imageInput");

        if (!input.files.length) {
            alert("Please select an image.");
            return;
        }

        const formData = new FormData();
        formData.append("file", input.files[0]);

        statusText.innerText = "Processing... Please wait.";
        button.disabled = true;

        try {
            const response = await fetch("/remove-bg", {
                method: "POST",
                body: formData
            });

            if (!response.ok) {
                throw new Error("Background removal failed");
            }

            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);

            const a = document.createElement("a");
            a.href = url;
            a.download = "output.png";
            document.body.appendChild(a);
            a.click();
            a.remove();

            statusText.innerText = "Background removed successfully!";
        } catch (error) {
            statusText.innerText = "Error removing background.";
            console.error(error);
        } finally {
            button.disabled = false;
        }
    };
</script>
</body>
</html>
